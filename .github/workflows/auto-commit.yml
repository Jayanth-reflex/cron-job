name: Auto Commit

on:
  schedule:
    # Runs 4 times daily after 9 PM IST (3:30 PM UTC)
    # 4 PM UTC (7:30 PM IST), 8 PM UTC (11:30 PM IST), 12 AM UTC (5:30 AM IST), 4 AM UTC (9:30 AM IST)
    - cron: '0 16,20,0,4 * * *'
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Configure Git
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
    
    - name: Update daily.txt with timestamp
      run: |
        echo "$(date '+%Y-%m-%d %H:%M:%S UTC')" > daily.txt
    
    - name: Commit and push changes
      run: |
        git add daily.txt
        git diff --cached --quiet || git commit -m "Automated commit on $(date '+%Y-%m-%d %H:%M:%S UTC')"
        git push 